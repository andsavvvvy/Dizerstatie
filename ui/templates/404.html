{% extends "base.html" %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<div class="container text-center" style="margin-top: 100px;">
    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 5rem;"></i>
    <h1 class="display-4 mt-4">404 - Page Not Found</h1>
    <p class="lead">The page you are looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
        <i class="bi bi-house"></i> Go to Dashboard
    </a>
</div>
{% endblock %}
